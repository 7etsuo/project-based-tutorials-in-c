name: Links

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    name: Check Markdown links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --root-dir "${{ github.workspace }}"
            --verbose
            --no-progress
            --max-retries 2
            --retry-wait-time 2
            --timeout 20
            --user-agent Mozilla/5.0
            './**/*.md'
          fail: true
          jobSummary: true
